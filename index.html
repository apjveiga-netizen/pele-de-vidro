<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pele de Vidro — Análise facial por inteligência artificial. Descubra sua idade visual e receba um protocolo personalizado de Face Yoga." />
    <meta name="theme-color" content="#0A0908" />
    <title>Pele de Vidro — Análise Facial por IA</title>
  </head>
  <body>
    <!-- Forensic Fail-Safe Overlay -->
    <div id="pdv-loader" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0A0908; color: #8C7B6B; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; font-family: sans-serif;">
      <div id="pdv-status" style="margin-bottom: 20px; font-size: 14px; letter-spacing: 2px;">INICIANDO...</div>
      <div id="pdv-error" style="max-width: 80%; color: #C47A7A; font-family: monospace; font-size: 12px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 4px; display: none;"></div>
    </div>

    <script>
      // Global Forensic Observer
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var errDiv = document.getElementById('pdv-error');
        if (errDiv) {
          errDiv.style.display = 'block';
          errDiv.innerHTML = "ERRO DETECTADO:<br>" + msg + "<br>Local: " + (url || 'desconhecido') + ":" + lineNo;
          document.getElementById('pdv-status').innerHTML = "FALHA NO CARREGAMENTO";
          document.getElementById('pdv-status').style.color = "#C47A7A";
        }
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        console.error('Unhandled rejection:', event.reason);
      });
      console.log("Forensics: Booting sequence started.");
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
